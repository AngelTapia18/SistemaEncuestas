services:
  app:
    build: .
    container_name: SistemaEncuestas-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/encuestas?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    networks:
      - spring-net

  db:
    image: mysql:8.0.27
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: encuestas
      MYSQL_ALLOW_EMPTY_PASSWORD: yes
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - spring-net

volumes:
  db_data:

networks:
  spring-net:

